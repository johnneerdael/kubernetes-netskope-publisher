    version: 1.3.2
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: "- kind: changed\n  description: enrollment.api.cleanupOnDelete\
        \ now defaults to false. The Netskope API rejects DELETE on a Publisher with\
        \ Private Apps attached, so the previous default-on could silently fail and\
        \ leave both orphan records and stranded apps. Opt in explicitly only when\
        \ scaled replicas never carry app assignments.\n"
      artifacthub.io/license: MIT
      artifacthub.io/links: "- name: Documentation\n  url: https://johnneerdael.github.io/kubernetes-netskope-publisher\n\
        - name: Source\n  url: https://github.com/johnneerdael/kubernetes-netskope-publisher\n"
