entries:
  kubernetes-netskope-publisher:
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: "- kind: removed\n  description: securityContext, hostNetwork,\
        \ and dnsPolicy are no longer values keys. The chart now derives all three\
        \ from networking.mode (pod or host) so values.yaml stops misrepresenting\
        \ what's actually rendered. If you had been overriding any of them, remove\
        \ those overrides \u2014 switching networking.mode is the supported knob.\n"
      artifacthub.io/license: MIT
      artifacthub.io/links: "- name: Documentation\n  url: https://johnneerdael.github.io/kubernetes-netskope-publisher\n\
        - name: Source\n  url: https://github.com/johnneerdael/kubernetes-netskope-publisher\n"
      artifacthub.io/maintainers: "- name: John Neerdael\n  email: john@neerdael.nl\n"
