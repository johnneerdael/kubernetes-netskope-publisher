    version: 1.1.1
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: "- kind: changed\n  description: Default networking.mode\
        \ flipped from host to pod. hostNetwork now defaults to false and dnsPolicy\
        \ to ClusterFirst. Upgrade hazard \u2014 pin networking.mode=host in your\
        \ values if you need the old behaviour.\n- kind: changed\n  description: serviceAccount.create\
        \ now defaults to false. The chart makes no kube-API calls, so the namespace\
        \ default ServiceAccount is sufficient.\n- kind: changed\n  description: Memory\
        \ resources bumped \u2014 limits 1Gi to 1536Mi, requests 384Mi to 1024Mi.\n\
        - kind: removed\n  description: Dead livenessProbe / readinessProbe value\
        \ blocks. The DaemonSet template hardcodes the real exec probes; the tcpSocket\
        \ values were never read.\n"
      artifacthub.io/license: MIT
      artifacthub.io/links: "- name: Documentation\n  url: https://johnneerdael.github.io/kubernetes-netskope-publisher\n\
        - name: Source\n  url: https://github.com/johnneerdael/kubernetes-netskope-publisher\n"
