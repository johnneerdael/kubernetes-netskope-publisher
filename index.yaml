    version: 1.3.1
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: "- kind: added\n  description: HorizontalPodAutoscaler\
        \ template for the StatefulSet path. CPU-based; enable with hpa.enabled=true\
        \ and tune hpa.minReplicas/maxReplicas/targetCPUUtilizationPercentage. Ignored\
        \ for DaemonSets.\n- kind: added\n  description: Pod preStop hook that deletes\
        \ the tenant-side Publisher record on termination (HPA scale-down, helm uninstall,\
        \ node drain). Default on in API mode; disable with enrollment.api.cleanupOnDelete=false.\
        \ Best-effort \u2014 failures do not block pod termination.\n"
      artifacthub.io/license: MIT
      artifacthub.io/links: "- name: Documentation\n  url: https://johnneerdael.github.io/kubernetes-netskope-publisher\n\
        - name: Source\n  url: https://github.com/johnneerdael/kubernetes-netskope-publisher\n"
