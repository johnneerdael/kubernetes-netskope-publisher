---
# Default values for npa-publisher Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Image configuration
#
# The chart works with the standard published Ubuntu 22 Publisher image.
# Override image.tag only when pinning a specific published build or release.
image:
  repository: "netskopeprivateaccess/publisher_u22"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  # Use any published tag, or keep "latest" for the default published image.
  tag: "latest"

# Rootless lwIP Publisher image.
# Used automatically when networking.mode=lwip.
lwipImage:
  repository: "netskopeprivateaccess/publisher_u22_test"
  tag: "10827"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Workload configuration.
# daemonset: one Publisher pod per matching node.
# statefulset: API-mode-only multi-replica mode. Each pod gets a stable
#              identity and appends its pod name to enrollment.commonName.
workload:
  type: "daemonset"
  replicas: 1

# HorizontalPodAutoscaler.
# Only meaningful when workload.type=statefulset. The HPA scales the
# StatefulSet on CPU utilisation; each new replica enrols itself via the
# API. Scale-down deletes the tenant-side Publisher record via the
# preStop hook (controlled by enrollment.api.cleanupOnDelete).
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  # Optional autoscaling/v2 behavior block (stabilizationWindow,
  # scaleDown/scaleUp policies). Leave empty to use Kubernetes defaults.
  behavior: {}

# Registration token configuration
# Only used when enrollment.mode=token.
registrationToken:
  # Token value (provide via --set for security)
  value: ""
  # Or reference an existing secret
  existingSecret: ""
  existingSecretKey: "token"

# Enrollment configuration
# api: Kubernetes-native default. The main container looks up or creates a Publisher,
#      generates a registration token, enrolls, then starts.
# token: uses a one-time registration token and the enroll init container.
enrollment:
  mode: "api"
  # Required when mode=api. Matched against Publisher common_name or publisher_name.
  # If no match exists, a Publisher is created with this value as its name.
  commonName: "npa-publisher"
  api:
    # Required when mode=api. Replace with your tenant URL, for example https://tenant.goskope.com.
    baseUrl: "https://tenant.goskope.com"
    # API authentication mode for Netskope REST calls.
    # token: use a static Netskope API token from existingSecret/tokenKey.
    # oauth2: fetch a short-lived bearer access token from oauth2.tokenUrl using
    #         client credentials from oauth2.existingSecret.
    authMode: "token"
    # Required when mode=api and authMode=token. Secret must contain the Netskope API token.
    existingSecret: "npa-api-token"
    tokenKey: "api-token"
    oauth2:
      # Required when authMode=oauth2. Full OAuth2 token endpoint URL for your tenant/identity provider.
      tokenUrl: ""
      # Required when authMode=oauth2. Secret must contain the OAuth2 client ID and client secret.
      existingSecret: "npa-api-oauth"
      clientIdKey: "client-id"
      clientSecretKey: "client-secret"
      # Optional OAuth2 scope value sent with the client_credentials request.
      scope: ""
    # Delete the tenant-side Publisher record on pod termination
    # (HPA scale-down, helm uninstall, node drain).
    #
    # Default OFF: the Netskope API rejects deletion of a Publisher
    # with Private Apps attached, so if any of your scaled replicas
    # carry app assignments — including bulk "attach to all
    # Publishers" patterns common in load-balanced setups — the
    # cleanup will silently fail and you'll still have orphans plus
    # stranded apps to chase.
    #
    # Only enable this if you're certain auto-scaled replicas never
    # have Private Apps attached (e.g. apps are only ever attached
    # to a fixed baseline Publisher). Otherwise prune manually via
    # the delete-publisher how-to.
    cleanupOnDelete: false

# Tenant configuration
tenant:
  # Tenant name (optional, will be extracted from token if not provided)
  name: ""

# Publisher configuration
publisher:
  # Log level (0=trace, 1=debug, 2=info, 3=warn, 4=error, 5=critical)
  logLevel: 3

  # Host OS type (ubuntu, centos, etc.)
  hostOsType: "ubuntu"

  # Discovery refresh flag
  discoveryRefresh: true

# Persistent storage configuration
persistence:
  enabled: false
  # Storage class (use default if not specified)
  storageClass: ""
  # Access mode
  accessMode: ReadWriteOnce
  # Size of the PVC
  size: 10Gi
  # Existing PVC name (optional, creates new if not specified)
  existingClaim: ""

# Network namespace / data-plane mode.
# pod (default): runs in the pod network namespace without hostNetwork or
#   privileged mode. The Publisher needs NET_ADMIN/NET_RAW and /dev/net/tun
#   for its container-local tunnel interface, routes, and iptables rules.
# lwip: rootless userspace data plane. No hostNetwork, privileged mode,
#   NET_ADMIN/NET_RAW, or /dev/net/tun mount. Automatically uses
#   lwipImage.repository:lwipImage.tag.
# host: legacy mode. Uses host networking and the full privileged
#   securityContext defined below.
networking:
  mode: "pod"
  # Only applies when mode=pod. Disables IPv6 best-effort inside the pod
  # network namespace before the Publisher creates tun0.
  disableIPv6: true

# Experimental lwIP rootless compatibility switches.
# fakeRootPasswd mounts a generated /etc/passwd where uid 65532 resolves
# to username "root". This is intended only to test binaries that check
# the username instead of the numeric uid while still running as uid 65532.
lwipRootlessCompat:
  fakeRootPasswd: false

# TUN device mount for networking.mode=pod.
tunDevice:
  enabled: true
  hostPath: /dev/net/tun
  mountPath: /dev/net/tun

# securityContext, hostNetwork, and dnsPolicy are derived from
# networking.mode and are not customisable via values:
#
#   networking.mode=pod  (default):
#     securityContext: privileged=false, allowPrivilegeEscalation=false,
#                      NET_ADMIN + NET_RAW, runAsUser=0
#     hostNetwork:     false
#     dnsPolicy:       ClusterFirst
#
#   networking.mode=lwip:
#     securityContext: privileged=false, allowPrivilegeEscalation=false,
#                      drop ALL capabilities, runAsNonRoot=true,
#                      runAsUser=65532, runAsGroup=65532
#     podSecurityContext: fsGroup=65532 for writable resources volume
#     hostNetwork:     false
#     dnsPolicy:       ClusterFirst
#
#   networking.mode=host:
#     securityContext: privileged=true,  allowPrivilegeEscalation=true,
#                      NET_ADMIN + NET_RAW, runAsUser=0
#     hostNetwork:     true
#     dnsPolicy:       ClusterFirstWithHostNet

# Pod-local DNS proxy for networking.mode=pod.
#
# The Publisher image historically starts BIND9 in the main container.
# In pod network mode the chart uses a small dnsmasq sidecar instead so
# Kubernetes service discovery continues to flow through the cluster DNS
# resolver that Kubernetes injects into /etc/resolv.conf.
localDns:
  enabled: true
  image:
    repository: "dockurr/dnsmasq"
    tag: "latest"
    pullPolicy: IfNotPresent
  cacheSize: 1000
  resources:
    limits:
      cpu: 50m
      memory: 64Mi
    requests:
      cpu: 5m
      memory: 16Mi

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1536Mi
  requests:
    cpu: 500m
    memory: 1024Mi

# Health probes are defined directly in the DaemonSet/StatefulSet template
# (exec probes that verify the publisher process plus its on-disk state).
# There are no parameterisable probe values in this chart.

# Termination grace period (seconds)
# Allows time for graceful shutdown of tunnels
terminationGracePeriodSeconds: 30

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service account.
# The chart makes no calls to the Kubernetes API, so the namespace's
# `default` ServiceAccount is sufficient and `create: false` is the
# default. Enable creation if you want to attach cloud IAM identities
# (IRSA, Workload Identity, etc.) or per-SA imagePullSecrets.
serviceAccount:
  create: false
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Proxy settings (optional)
proxy:
  enabled: false
  # HTTP proxy URL
  httpProxy: ""
  # HTTPS proxy URL
  httpsProxy: ""
  # No proxy hosts
  noProxy: ""

# BIND9 DNS forwarder configuration for networking.mode=host only.
#
# Do not set this in pod network mode. Pod mode keeps dnsPolicy=ClusterFirst
# and uses the localDns dnsmasq sidecar to forward to Kubernetes cluster DNS.
# If private domains need authoritative external DNS in pod mode, configure
# forwarding on CoreDNS/cluster DNS instead of bypassing it per pod.
bind:
  # List of DNS forwarder IP addresses
  # Example: ["8.8.8.8", "8.8.4.4", "1.1.1.1"]
  # Leave empty in host mode to auto-discover from the pod's resolv.conf.
  forwarders: []

# Custom settings.json (optional)
# If provided via ConfigMap, will override default settings
customSettings:
  enabled: false
  # Name of existing ConfigMap containing settings.json
  configMapName: ""

# Init container configuration
initContainer:
  # Image for init container (uses same image as main container)
  image:
    repository: ""  # Uses main image.repository if empty
    tag: ""         # Uses main image.tag if empty
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
