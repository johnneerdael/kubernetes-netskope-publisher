apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
  labels:
    {{- include "kubernetes-netskope-publisher.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.publisher.logLevel | quote }}
  HOST_OS_TYPE: {{ .Values.publisher.hostOsType | quote }}
  k8s-bootstrap.sh: |
{{- .Files.Get "files/k8s-bootstrap.sh" | nindent 4 }}
  {{- if .Values.publisher.discoveryRefresh }}
  DISCOVERY_REFRESH: "true"
  {{- end }}
  {{- if .Values.proxy.enabled }}
  PUBLISHER_USE_PROXY: "1"
  HTTP_PROXY: {{ .Values.proxy.httpProxy | quote }}
  HTTPS_PROXY: {{ .Values.proxy.httpsProxy | quote }}
  NO_PROXY: {{ .Values.proxy.noProxy | quote }}
  {{- end }}
  {{- if and (not (include "kubernetes-netskope-publisher.isPodNetworking" .)) .Values.bind.forwarders }}
  BIND_FORWARDERS: {{ join "," .Values.bind.forwarders | quote }}
  {{- end }}
  {{- if include "kubernetes-netskope-publisher.isApiEnrollment" . }}
  ENROLLMENT_MODE: "api"
  NPA_PUBLISHER_COMMON_NAME: {{ .Values.enrollment.commonName | quote }}
  NPA_API_BASE_URL: {{ trimSuffix "/" .Values.enrollment.api.baseUrl | quote }}
  NPA_API_AUTH_MODE: {{ include "kubernetes-netskope-publisher.apiAuthMode" . | quote }}
  {{- if include "kubernetes-netskope-publisher.isApiOauth2Auth" . }}
  NPA_API_OAUTH_TOKEN_URL: {{ .Values.enrollment.api.oauth2.tokenUrl | quote }}
  {{- if .Values.enrollment.api.oauth2.scope }}
  NPA_API_OAUTH_SCOPE: {{ .Values.enrollment.api.oauth2.scope | quote }}
  {{- end }}
  {{- end }}
  k8s-api-enroll-and-start.sh: |
    #!/bin/bash
    set -euo pipefail

    log() {
      echo "[npa-api-enrollment] $*" >&2
    }

    fail() {
      log "ERROR: $*"
      exit 1
    }

    require_env() {
      local name="$1"
      if [ -z "${!name:-}" ]; then
        fail "Missing required environment variable: ${name}"
      fi
    }

    have_enrollment_artifacts() {
      test -s /home/resources/publisherid \
        && test -s /home/resources/sslcert/agent.pem \
        && test -s /home/resources/settings.json
    }

    start_publisher() {
      if [ ! -x /home/k8s-bootstrap.sh ]; then
        fail "Missing executable /home/k8s-bootstrap.sh; the Helm chart must mount the k8s-bootstrap ConfigMap item into the publisher container"
      fi

      exec /home/k8s-bootstrap.sh
    }

    lookup_publisher_id() {
      local payload
      local match_count
      local status
      local publisher_id

      payload="$(cat)"
      match_count="$(jq --arg publisher_name "${NPA_PUBLISHER_COMMON_NAME}" \
        '[.data.publishers[]? | select(.common_name == $publisher_name or .publisher_name == $publisher_name)] | length' \
        <<< "${payload}")"

      if [ "${match_count}" -eq 0 ]; then
        return 10
      fi
      if [ "${match_count}" -gt 1 ]; then
        echo "Multiple publishers matched configured Publisher name/common_name: ${NPA_PUBLISHER_COMMON_NAME}" >&2
        return 11
      fi

      status="$(jq -r --arg publisher_name "${NPA_PUBLISHER_COMMON_NAME}" \
        '.data.publishers[]? | select(.common_name == $publisher_name or .publisher_name == $publisher_name) | .status // ""' \
        <<< "${payload}")"
      publisher_id="$(jq -r --arg publisher_name "${NPA_PUBLISHER_COMMON_NAME}" \
        '.data.publishers[]? | select(.common_name == $publisher_name or .publisher_name == $publisher_name) | .publisher_id // empty' \
        <<< "${payload}")"

      if [ "${status}" = "connected" ]; then
        echo "Publisher ${NPA_PUBLISHER_COMMON_NAME} is already connected" >&2
        return 12
      fi
      if [ -z "${publisher_id}" ]; then
        echo "Publisher ${NPA_PUBLISHER_COMMON_NAME} response is missing publisher_id" >&2
        return 13
      fi

      echo "${publisher_id}"
    }

    log_json_summary() {
      local label="$1"
      local response_file="$2"

      if jq empty "${response_file}" >/dev/null 2>&1; then
        log "${label}: $(jq -c '{status: .status, message: .message, error: .error, errors: .errors, data: {id: .data.id, common_name: .data.common_name, name: .data.name, publisher_id: .data.publisher_id, registered: .data.registered, status: .data.status}}' "${response_file}")"
      else
        log "${label}: non-JSON response: $(head -c 500 "${response_file}")"
      fi
    }

    fetch_oauth2_access_token() {
      local oauth_response
      local token

      require_env NPA_API_OAUTH_TOKEN_URL
      require_env NPA_API_OAUTH_CLIENT_ID
      require_env NPA_API_OAUTH_CLIENT_SECRET

      oauth_response="$(mktemp)"
      curl --fail --silent --show-error \
        --request POST \
        --header "Accept: application/json" \
        --header "Content-Type: application/x-www-form-urlencoded" \
        --data-urlencode "grant_type=client_credentials" \
        --data-urlencode "client_id=${NPA_API_OAUTH_CLIENT_ID}" \
        --data-urlencode "client_secret=${NPA_API_OAUTH_CLIENT_SECRET}" \
        {{- if .Values.enrollment.api.oauth2.scope }}
        --data-urlencode "scope=${NPA_API_OAUTH_SCOPE}" \
        {{- end }}
        "${NPA_API_OAUTH_TOKEN_URL}" \
        --output "${oauth_response}" \
        || {
          log_json_summary "OAuth2 token response summary" "${oauth_response}"
          rm -f "${oauth_response}"
          fail "Failed to fetch OAuth2 access token"
        }

      token="$(jq -r '.access_token // empty' "${oauth_response}")"
      if [ -z "${token}" ]; then
        log_json_summary "OAuth2 token response summary" "${oauth_response}"
        rm -f "${oauth_response}"
        fail "OAuth2 token response missing access_token"
      fi

      rm -f "${oauth_response}"
      echo "${token}"
    }

    resolve_api_access_token() {
      case "${NPA_API_AUTH_MODE:-token}" in
        token)
          require_env NPA_API_TOKEN
          echo "${NPA_API_TOKEN}"
          ;;
        oauth2)
          fetch_oauth2_access_token
          ;;
        *)
          fail "Unsupported NPA_API_AUTH_MODE=${NPA_API_AUTH_MODE:-}"
          ;;
      esac
    }

    extract_created_publisher_id() {
      local publisher_id

      publisher_id="$(jq -r '.data.id // empty')"
      if [ -z "${publisher_id}" ]; then
        echo "Publisher creation response missing data.id" >&2
        return 20
      fi

      echo "${publisher_id}"
    }

    create_publisher() {
      local create_response="$1"

      log "Publisher name/common_name=${NPA_PUBLISHER_COMMON_NAME} not found; creating Publisher"
      jq -n --arg name "${NPA_PUBLISHER_COMMON_NAME}" '{name: $name}' \
        | curl --fail --silent --show-error \
          --request POST \
          --header "Authorization: Bearer ${api_access_token}" \
          --header "Accept: application/json" \
          --header "Content-Type: application/json" \
          --data @- \
          "${NPA_API_BASE_URL}/api/v2/infrastructure/publishers" \
          --output "${create_response}" \
        || fail "Failed to create Publisher for name=${NPA_PUBLISHER_COMMON_NAME}"

      extract_created_publisher_id < "${create_response}" \
        || {
          log_json_summary "Publisher creation response summary" "${create_response}"
          fail "Failed to read Publisher ID from creation response"
        }
    }

    extract_registration_token() {
      local token

      token="$(jq -r '.data.token // empty')"
      if [ -z "${token}" ]; then
        echo "Registration token response missing data.token" >&2
        return 20
      fi

      echo "${token}"
    }

    require_env NPA_API_BASE_URL
    require_env NPA_PUBLISHER_COMMON_NAME

    if [ "${NPA_COMMON_NAME_APPEND_POD_NAME:-false}" = "true" ]; then
      require_env POD_NAME
      NPA_PUBLISHER_COMMON_NAME="${NPA_PUBLISHER_COMMON_NAME}-${POD_NAME}"
    fi

    log "API enrollment mode active for common_name=${NPA_PUBLISHER_COMMON_NAME}"
    log "Using API auth mode=${NPA_API_AUTH_MODE:-token}"

    if have_enrollment_artifacts; then
      log "Existing enrollment artifacts found; starting publisher"
      start_publisher
    fi

    api_access_token="$(resolve_api_access_token)"

    publishers_response="$(mktemp)"
    create_response="$(mktemp)"
    token_response="$(mktemp)"
    cleanup() {
      rm -f "${publishers_response}" "${create_response}" "${token_response}"
    }
    trap cleanup EXIT

    log "Fetching publisher list"
    curl --fail --silent --show-error \
      --header "Authorization: Bearer ${api_access_token}" \
      --header "Accept: application/json" \
      "${NPA_API_BASE_URL}/api/v2/infrastructure/publishers" \
      --output "${publishers_response}" \
      || fail "Failed to fetch publisher list"

    lookup_status=0
    publisher_id="$(lookup_publisher_id < "${publishers_response}")" || lookup_status=$?
    if [ "${lookup_status}" -eq 10 ]; then
      publisher_id="$(create_publisher "${create_response}")"
    elif [ "${lookup_status}" -ne 0 ]; then
      fail "Failed to select publisher by name/common_name=${NPA_PUBLISHER_COMMON_NAME}"
    fi

    log "Selected publisher_id=${publisher_id}"
    log "Generating registration token"
    curl --fail --silent --show-error \
      --request POST \
      --header "Authorization: Bearer ${api_access_token}" \
      --header "Accept: application/json" \
      "${NPA_API_BASE_URL}/api/v2/infrastructure/publishers/${publisher_id}/registration_token" \
      --output "${token_response}" \
      || fail "Failed to generate registration token for publisher_id=${publisher_id}"

    registration_token="$(extract_registration_token < "${token_response}")" \
      || fail "Failed to read registration token from API response"

    log "Running publisher enrollment wizard"
    cd /home
    /home/npa_publisher_wizard -token "${registration_token}" \
      || fail "Publisher enrollment wizard failed"
    unset registration_token
    unset api_access_token

    log "Enrollment complete; starting publisher"
    start_publisher
  {{- end }}
