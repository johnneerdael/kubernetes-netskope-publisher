{{- include "kubernetes-netskope-publisher.validateEnrollment" . -}}
apiVersion: apps/v1
kind: {{ if include "kubernetes-netskope-publisher.isStatefulSet" . }}StatefulSet{{ else }}DaemonSet{{ end }}
metadata:
  name: {{ include "kubernetes-netskope-publisher.fullname" . }}
  labels:
    {{- include "kubernetes-netskope-publisher.labels" . | nindent 4 }}
spec:
  {{- if include "kubernetes-netskope-publisher.isStatefulSet" . }}
  serviceName: {{ include "kubernetes-netskope-publisher.fullname" . }}-headless
  podManagementPolicy: Parallel
  replicas: {{ .Values.workload.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubernetes-netskope-publisher.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "kubernetes-netskope-publisher.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubernetes-netskope-publisher.serviceAccountName" . }}
      hostNetwork: {{ include "kubernetes-netskope-publisher.hostNetwork" . }}
      dnsPolicy: {{ include "kubernetes-netskope-publisher.dnsPolicy" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if include "kubernetes-netskope-publisher.isLwipNetworking" . }}
      securityContext:
        {{- include "kubernetes-netskope-publisher.podSecurityContext" . | nindent 8 }}
      {{- end }}
      {{- if not (include "kubernetes-netskope-publisher.isApiEnrollment" .) }}
      initContainers:
        - name: enroll
          image: "{{ .Values.initContainer.image.repository | default (include "kubernetes-netskope-publisher.publisherImageRepository" .) }}:{{ .Values.initContainer.image.tag | default (include "kubernetes-netskope-publisher.publisherImageTag" .) }}"
          imagePullPolicy: {{ include "kubernetes-netskope-publisher.publisherImagePullPolicy" . }}
          command:
            - /bin/bash
          args:
            - -c
            - |
              cd /home && /home/npa_publisher_wizard -token "$(cat /tmp/token/token)"
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
                  key: LOG_LEVEL
          volumeMounts:
            - name: resources
              mountPath: /home/resources
            - name: token
              mountPath: /tmp/token
              readOnly: true
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: publisher
          image: "{{ include "kubernetes-netskope-publisher.publisherImage" . }}"
          imagePullPolicy: {{ include "kubernetes-netskope-publisher.publisherImagePullPolicy" . }}
          command:
            {{- if include "kubernetes-netskope-publisher.isApiEnrollment" . }}
            - /bin/bash
            - /home/k8s-api-enroll-and-start.sh
            {{- else }}
            - /home/k8s-bootstrap.sh
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NPA_NETWORKING_MODE
              value: {{ include "kubernetes-netskope-publisher.networkingMode" . | quote }}
            {{- if include "kubernetes-netskope-publisher.isLwipNetworking" . }}
            - name: DATA_PLANE
              value: "lwip"
            {{- end }}
            {{- if and (include "kubernetes-netskope-publisher.isPodNetworking" .) .Values.networking.disableIPv6 }}
            - name: NPA_DISABLE_IPV6
              value: "true"
            {{- end }}
            {{- if include "kubernetes-netskope-publisher.isStatefulSet" . }}
            - name: NPA_COMMON_NAME_APPEND_POD_NAME
              value: "true"
            {{- end }}
            {{- if include "kubernetes-netskope-publisher.isApiEnrollment" . }}
            {{- if include "kubernetes-netskope-publisher.isApiTokenAuth" . }}
            - name: NPA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enrollment.api.existingSecret }}
                  key: {{ .Values.enrollment.api.tokenKey }}
            {{- else if include "kubernetes-netskope-publisher.isApiOauth2Auth" . }}
            - name: NPA_API_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enrollment.api.oauth2.existingSecret }}
                  key: {{ .Values.enrollment.api.oauth2.clientIdKey }}
            - name: NPA_API_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enrollment.api.oauth2.existingSecret }}
                  key: {{ .Values.enrollment.api.oauth2.clientSecretKey }}
            {{- end }}
            {{- end }}
          securityContext:
            {{- include "kubernetes-netskope-publisher.securityContext" . | nindent 12 }}
          volumeMounts:
            - name: resources
              mountPath: /home/resources
            - name: k8s-bootstrap
              mountPath: /home/k8s-bootstrap.sh
              subPath: k8s-bootstrap.sh
              readOnly: true
            {{- if and (include "kubernetes-netskope-publisher.isLwipNetworking" .) .Values.lwipRootlessCompat.fakeRootPasswd }}
            - name: fake-root-passwd
              mountPath: /etc/passwd
              subPath: passwd
              readOnly: true
            {{- end }}
            {{- if and (include "kubernetes-netskope-publisher.isPodNetworking" .) .Values.tunDevice.enabled }}
            - name: dev-net-tun
              mountPath: {{ .Values.tunDevice.mountPath }}
            {{- end }}
            {{- if include "kubernetes-netskope-publisher.isApiEnrollment" . }}
            - name: api-enrollment-wrapper
              mountPath: /home/k8s-api-enroll-and-start.sh
              subPath: k8s-api-enroll-and-start.sh
              readOnly: true
            {{- end }}
            {{- if .Values.customSettings.enabled }}
            - name: custom-settings
              mountPath: /home/resources/settings.json
              subPath: settings.json
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  pgrep -f "/home/npa_publisher\b" >/dev/null \
                  && test -s /home/resources/publisherid \
                  && test -s /home/resources/sslcert/agent.pem \
                  && test -s /home/resources/settings.json
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  pgrep -f "/home/npa_publisher\b" >/dev/null \
                  && test -s /home/resources/publisherid \
                  && test -s /home/resources/sslcert/agent.pem \
                  && test -s /home/resources/nsconfig.json \
                  && test -s /home/resources/loglevel
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if and (include "kubernetes-netskope-publisher.isApiEnrollment" .) .Values.enrollment.api.cleanupOnDelete }}
          lifecycle:
            preStop:
              exec:
                # Delete this pod's Publisher record in the Netskope tenant
                # so HPA scale-down, helm uninstall, and node drains don't
                # leave orphan Publishers behind. Best-effort: failures don't
                # block pod termination.
                command:
                  - /bin/bash
                  - -c
                  - |
                    set -u
                    pid_file=/home/resources/publisherid
                    [ -s "$pid_file" ] || exit 0
                    pid="$(cat "$pid_file" 2>/dev/null || true)"
                    [ -n "$pid" ] || exit 0
                    api_access_token=""
                    {{- if include "kubernetes-netskope-publisher.isApiTokenAuth" . }}
                    api_access_token="${NPA_API_TOKEN:-}"
                    {{- else if include "kubernetes-netskope-publisher.isApiOauth2Auth" . }}
                    oauth_response="$(mktemp)"
                    curl --silent --show-error --max-time 10 \
                      --request POST \
                      --header "Accept: application/json" \
                      --header "Content-Type: application/x-www-form-urlencoded" \
                      --data-urlencode "grant_type=client_credentials" \
                      --data-urlencode "client_id=${NPA_API_OAUTH_CLIENT_ID}" \
                      --data-urlencode "client_secret=${NPA_API_OAUTH_CLIENT_SECRET}" \
                      {{- if .Values.enrollment.api.oauth2.scope }}
                      --data-urlencode "scope={{ .Values.enrollment.api.oauth2.scope }}" \
                      {{- end }}
                      "${NPA_API_OAUTH_TOKEN_URL}" \
                      --output "${oauth_response}" \
                      >/dev/null 2>&1 || true
                    api_access_token="$(jq -r '.access_token // empty' "${oauth_response}" 2>/dev/null || true)"
                    rm -f "${oauth_response}"
                    {{- end }}
                    [ -n "$api_access_token" ] || exit 0
                    curl --silent --show-error --max-time 10 \
                      --request DELETE \
                      --header "Authorization: Bearer ${api_access_token}" \
                      "${NPA_API_BASE_URL}/api/v2/infrastructure/publishers/${pid}" \
                      >/dev/null 2>&1 || true
                    exit 0
          {{- end }}
        {{- if and (include "kubernetes-netskope-publisher.isPodNetworking" .) .Values.localDns.enabled }}
        - name: local-dns
          image: "{{ .Values.localDns.image.repository }}:{{ .Values.localDns.image.tag }}"
          imagePullPolicy: {{ .Values.localDns.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              UPSTREAM_DNS="$(awk '$1 == "nameserver" && $2 !~ /^127\./ && $2 != "::1" { print $2; exit }' /etc/resolv.conf)"
              if [ -z "${UPSTREAM_DNS}" ]; then
                echo "No non-loopback upstream DNS server found in /etc/resolv.conf" >&2
                exit 1
              fi

              exec dnsmasq \
                --keep-in-foreground \
                --no-resolv \
                --listen-address=127.0.0.1 \
                --bind-interfaces \
                --server="${UPSTREAM_DNS}" \
                --cache-size={{ .Values.localDns.cacheSize }} \
                --log-facility=-
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            {{- toYaml .Values.localDns.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: resources
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "kubernetes-netskope-publisher.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: k8s-bootstrap
          configMap:
            name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
            defaultMode: 0755
            items:
              - key: k8s-bootstrap.sh
                path: k8s-bootstrap.sh
        {{- if and (include "kubernetes-netskope-publisher.isLwipNetworking" .) .Values.lwipRootlessCompat.fakeRootPasswd }}
        - name: fake-root-passwd
          configMap:
            name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
            items:
              - key: fake-root-passwd
                path: passwd
        {{- end }}
        {{- if and (include "kubernetes-netskope-publisher.isPodNetworking" .) .Values.tunDevice.enabled }}
        - name: dev-net-tun
          hostPath:
            path: {{ .Values.tunDevice.hostPath }}
            type: CharDevice
        {{- end }}
        {{- if include "kubernetes-netskope-publisher.isApiEnrollment" . }}
        - name: api-enrollment-wrapper
          configMap:
            name: {{ include "kubernetes-netskope-publisher.fullname" . }}-config
            defaultMode: 0755
            items:
              - key: k8s-api-enroll-and-start.sh
                path: k8s-api-enroll-and-start.sh
        {{- end }}
        {{- if not (include "kubernetes-netskope-publisher.isApiEnrollment" .) }}
        - name: token
          secret:
            secretName: {{ .Values.registrationToken.existingSecret | default (printf "%s-token" (include "kubernetes-netskope-publisher.fullname" .)) }}
            items:
              - key: {{ .Values.registrationToken.existingSecretKey }}
                path: token
        {{- end }}
        {{- if .Values.customSettings.enabled }}
        - name: custom-settings
          configMap:
            name: {{ .Values.customSettings.configMapName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
