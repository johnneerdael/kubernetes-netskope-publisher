{{- if include "npa-publisher.isStatefulSet" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "npa-publisher.fullname" . }}-headless
  labels:
    {{- include "npa-publisher.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "npa-publisher.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: health
      port: 1234
      targetPort: 1234
{{- end }}
