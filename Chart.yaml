apiVersion: v2
name: kubernetes-netskope-publisher
description: Netskope Private Access Publisher for Kubernetes
type: application
version: 1.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - netskope
  - npa
  - publisher
  - private-access
  - zero-trust
  - sase
  - ztna
home: https://johnneerdael.github.io/kubernetes-netskope-publisher
sources:
  - https://github.com/johnneerdael/kubernetes-netskope-publisher
maintainers:
  - name: John Neerdael
    email: john@neerdael.nl
    url: https://github.com/johnneerdael
icon: https://johnneerdael.github.io/kubernetes-netskope-publisher/images/netskope-favicon-192x192.png
annotations:
  # See https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/category: networking
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Documentation
      url: https://johnneerdael.github.io/kubernetes-netskope-publisher
    - name: Source
      url: https://github.com/johnneerdael/kubernetes-netskope-publisher
  artifacthub.io/maintainers: |
    - name: John Neerdael
      email: john@neerdael.nl
  artifacthub.io/changes: |
    - kind: changed
      description: Default networking.mode flipped from host to pod. hostNetwork now defaults to false and dnsPolicy to ClusterFirst. Upgrade hazard — pin networking.mode=host in your values if you need the old behaviour.
    - kind: changed
      description: serviceAccount.create now defaults to false. The chart makes no kube-API calls, so the namespace default ServiceAccount is sufficient.
    - kind: changed
      description: Memory resources bumped — limits 1Gi to 1536Mi, requests 384Mi to 1024Mi.
    - kind: removed
      description: Dead livenessProbe / readinessProbe value blocks. The DaemonSet template hardcodes the real exec probes; the tcpSocket values were never read.
