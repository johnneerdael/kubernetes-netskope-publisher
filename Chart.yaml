    - kind: removed
      description: securityContext, hostNetwork, and dnsPolicy are no longer values keys. The chart now derives all three from networking.mode (pod or host) so values.yaml stops misrepresenting what's actually rendered. If you had been overriding any of them, remove those overrides — switching networking.mode is the supported knob.
