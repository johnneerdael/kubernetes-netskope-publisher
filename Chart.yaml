apiVersion: v2
name: kubernetes-netskope-publisher
description: Netskope Private Access Publisher for Kubernetes
type: application
version: 1.3.0
appVersion: "1.0.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - netskope
  - npa
  - publisher
  - private-access
  - zero-trust
  - sase
  - ztna
home: https://johnneerdael.github.io/kubernetes-netskope-publisher
sources:
  - https://github.com/johnneerdael/kubernetes-netskope-publisher
maintainers:
  - name: John Neerdael
    email: john@neerdael.nl
    url: https://github.com/johnneerdael
icon: https://johnneerdael.github.io/kubernetes-netskope-publisher/images/netskope-favicon-192x192.png
annotations:
  # See https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/category: networking
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Documentation
      url: https://johnneerdael.github.io/kubernetes-netskope-publisher
    - name: Source
      url: https://github.com/johnneerdael/kubernetes-netskope-publisher
  artifacthub.io/maintainers: |
    - name: John Neerdael
      email: john@neerdael.nl
  artifacthub.io/changes: |
    - kind: added
      description: HorizontalPodAutoscaler template for the StatefulSet path. CPU-based; enable with hpa.enabled=true and tune hpa.minReplicas/maxReplicas/targetCPUUtilizationPercentage. Ignored for DaemonSets.
    - kind: added
      description: Pod preStop hook that deletes the tenant-side Publisher record on termination (HPA scale-down, helm uninstall, node drain). Default on in API mode; disable with enrollment.api.cleanupOnDelete=false. Best-effort — failures do not block pod termination.
