name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'artifact-repo.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

# Serialize against release.yml so we never push to gh-pages concurrently.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npx hexo generate

      - name: Copy artifact-repo.yml into the published site
        # Artifact Hub fetches this file from the same URL it was
        # registered with (the Pages URL), so it must live alongside
        # the site rather than only at the repo root on main.
        run: cp artifact-repo.yml site/public/artifact-repo.yml

      - name: Deploy to gh-pages (preserve helm repo files)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/public
          publish_branch: gh-pages
          keep_files: true              # preserve index.yaml from release.yml
          commit_message: "site: ${{ github.sha }}"
